{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flask-cicd-app.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flask-cicd-app.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "flask-cicd-app.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flask-cicd-app.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "flask-cicd-app.fullname" . }}-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flask-cicd-app.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "flask-cicd-app.fullname" . }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "flask-cicd-app.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
