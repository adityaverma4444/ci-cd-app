apiVersion: v1
kind: Secret
metadata:
  name: db-file-secret
type: Opaque
stringData:
  DB_HOST: {{ .Values.db.host }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name }}
  DB_USER: {{ .Values.db.user }}
  DB_PASSWORD: {{ .Values.db.password }}

  # linked with db in valuesyaml 
  #Note: stringData means you write plain text — Kubernetes auto-encodes to base64. No need to encode yourself.

