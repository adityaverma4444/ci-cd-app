apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-cicd-app
  labels:
    app: flask-cicd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-cicd
  template:
    metadata:
      labels:
        app: flask-cicd
    spec:
      containers:
        - name: flask-cicd
          image: flask-cicd-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000

          env:
            - name: DB_HOST
              value: mariadb-lab
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: appdb
            - name: DB_USER
              value: appuser
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret-manual
                  key: DB_PASSWORD

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
              
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: db-secrets
              mountPath: /etc/db-secrets
              readOnly: true
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: flask-pvc
        - name: db-secrets
          secret:
            secretName: db-secret-manual
      tolerations:
        - key: "env"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"
